<!DOCTYPE html>
<html lang="ko" data-theme="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>토스 AI 자동매매 — 대시보드</title>
<style>
  :root {
    color-scheme: light;
    --plane:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
    --grid:#e1e0d9; --axis:#c3c2b7; --ring:rgba(11,11,11,0.10);
    --s1:#2a78d6; --s2:#008300; --up:#006300; --down:#d03b3b;
    --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b; --info:#2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      color-scheme: dark;
      --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
      --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,0.10);
      --s1:#3987e5; --s2:#008300; --up:#0ca30c;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,0.10);
    --s1:#3987e5; --s2:#008300; --up:#0ca30c;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--plane); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif; font-size:14px; line-height:1.45; }
  a { color:var(--s1); }
  .wrap { max-width:1200px; margin:0 auto; padding:16px; }
  header { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
  header h1 { font-size:17px; margin:0; font-weight:650; }
  header .spacer { flex:1; }
  .btn { background:var(--surface); color:var(--ink2); border:1px solid var(--ring);
    border-radius:8px; padding:7px 12px; font-size:13px; cursor:pointer; }
  .btn:hover { color:var(--ink); }
  .updated { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
  /* 상태 배지 */
  .badges { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .badge { display:inline-flex; align-items:center; gap:6px; background:var(--surface);
    border:1px solid var(--ring); border-radius:999px; padding:6px 12px; font-size:13px; }
  .badge b { font-weight:600; }
  .dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .dot.good{background:var(--good)} .dot.warn{background:var(--warn)}
  .dot.crit{background:var(--crit)} .dot.info{background:var(--info)} .dot.mute{background:var(--muted)}
  /* 카드 그리드 */
  .grid { display:grid; grid-template-columns:repeat(12,1fr); gap:14px; }
  .card { background:var(--surface); border:1px solid var(--ring); border-radius:12px; padding:14px; }
  .card h2 { font-size:13px; font-weight:600; color:var(--ink2); margin:0 0 10px;
    text-transform:uppercase; letter-spacing:.03em; }
  .col-8{grid-column:span 8} .col-6{grid-column:span 6} .col-4{grid-column:span 4}
  .col-12{grid-column:span 12}
  @media (max-width:820px){ .col-8,.col-6,.col-4{grid-column:span 12} }
  /* 스탯 타일 */
  .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(96px,1fr)); gap:12px; }
  .tile .k { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.03em; }
  .tile .v { font-size:22px; font-weight:650; font-variant-numeric:tabular-nums; margin-top:2px; }
  .tile .v.up{color:var(--up)} .tile .v.down{color:var(--down)}
  .verdict { margin-top:12px; font-size:13px; color:var(--ink2); }
  /* 자산곡선 차트 */
  .chart-legend { display:flex; gap:16px; margin-bottom:6px; font-size:12px; color:var(--ink2); }
  .chart-legend i { display:inline-block; width:14px; height:2px; vertical-align:middle; margin-right:5px; }
  svg .grid-line{ stroke:var(--grid); stroke-width:1 }
  svg .axis-txt{ fill:var(--muted); font-size:10px; font-variant-numeric:tabular-nums }
  #tip { position:fixed; pointer-events:none; background:var(--surface); border:1px solid var(--ring);
    border-radius:8px; padding:8px 10px; font-size:12px; box-shadow:0 4px 14px rgba(0,0,0,.12);
    display:none; z-index:5; font-variant-numeric:tabular-nums; }
  /* 분포 바 */
  .splitbar { display:flex; height:14px; border-radius:7px; overflow:hidden; margin:8px 0 6px; }
  .splitbar > span { display:block; }
  .split-legend { display:flex; gap:14px; font-size:12px; color:var(--ink2); flex-wrap:wrap; }
  .sq { display:inline-block; width:10px; height:10px; border-radius:3px; vertical-align:middle; margin-right:5px; }
  /* 테이블 */
  .tbl { width:100%; border-collapse:collapse; font-size:12.5px; }
  .tbl th { text-align:left; color:var(--muted); font-weight:500; padding:5px 8px;
    border-bottom:1px solid var(--grid); font-size:11px; text-transform:uppercase; }
  .tbl td { padding:6px 8px; border-bottom:1px solid var(--grid); vertical-align:top;
    font-variant-numeric:tabular-nums; }
  .tbl tr:last-child td { border-bottom:none; }
  .scroll { overflow-x:auto; }
  .pill { font-size:11px; padding:1px 7px; border-radius:999px; border:1px solid var(--ring); }
  .buy{ color:var(--s1) } .sell{ color:var(--down) } .hold{ color:var(--muted) }
  .headline { color:var(--ink); }
  .sub { color:var(--muted); font-size:11px; }
  .empty { color:var(--muted); padding:18px 4px; text-align:center; }
  /* 키 게이트 */
  #gate { position:fixed; inset:0; background:var(--plane); display:none; place-items:center; z-index:10; }
  #gate.on{ display:grid; }
  #gate .box { background:var(--surface); border:1px solid var(--ring); border-radius:12px;
    padding:22px; width:min(360px,90vw); }
  #gate input { width:100%; padding:9px 11px; margin:12px 0; border:1px solid var(--ring);
    border-radius:8px; background:var(--plane); color:var(--ink); font-size:14px; }
  #err { color:var(--crit); font-size:12px; min-height:16px; }
</style>
</head>
<body>
<div id="gate"><div class="box">
  <b>대시보드 접속</b>
  <div class="sub" style="margin-top:6px">서버 API 키(X-API-Key)를 입력하세요. 로컬에 저장됩니다.</div>
  <input id="keyin" type="password" placeholder="API_KEY" autocomplete="off">
  <div id="err"></div>
  <button class="btn" id="keygo" style="width:100%">접속</button>
</div></div>

<div class="wrap">
  <header>
    <h1>토스 AI 자동매매 · 대시보드</h1>
    <span class="spacer"></span>
    <span class="updated" id="updated">—</span>
    <button class="btn" id="refresh">새로고침</button>
    <button class="btn" id="theme">🌗</button>
    <button class="btn" id="logout" title="API 키 지우기">⎋</button>
  </header>

  <div class="badges" id="badges"></div>

  <div class="grid">
    <div class="card col-8">
      <h2>성과 — 누적 수익 지수 (시작 = 100)</h2>
      <div class="chart-legend">
        <span><i style="background:var(--s1)"></i>포트폴리오</span>
        <span><i style="background:var(--s2)"></i>벤치마크(KODEX 200)</span>
      </div>
      <div id="chart"></div>
    </div>
    <div class="card col-4">
      <h2>평가 지표</h2>
      <div class="tiles" id="tiles"></div>
      <div class="verdict" id="verdict"></div>
    </div>

    <div class="card col-4">
      <h2>논문 뉴스 수집 (§8)</h2>
      <div id="news"></div>
    </div>
    <div class="card col-8">
      <h2>최근 틱</h2>
      <div class="scroll" id="ticks"></div>
    </div>

    <div class="card col-6">
      <h2>최근 주문</h2>
      <div class="scroll" id="orders"></div>
    </div>
    <div class="card col-6">
      <h2>안전 이벤트 (감사 로그)</h2>
      <div class="scroll" id="audits"></div>
    </div>
  </div>
</div>

<div id="tip"></div>

<script>
const $ = s => document.querySelector(s);
const KEY = "toss_dash_api_key";
let apiKey = localStorage.getItem(KEY) || "";
let lastEquity = [];

// ── 테마 토글 ──
const root = document.documentElement;
$("#theme").onclick = () => {
  const cur = root.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : (cur === "light" ? "" : "dark");
  root.setAttribute("data-theme", next);
  localStorage.setItem("toss_dash_theme", next);
  if (lastEquity.length) drawChart(lastEquity);
};
root.setAttribute("data-theme", localStorage.getItem("toss_dash_theme") || "");

// ── 유틸 ──
const nf = new Intl.NumberFormat("ko-KR");
const pct = x => (x>=0?"+":"") + (x*100).toFixed(2) + "%";
const won = x => nf.format(Math.round(Number(x))) + "원";
const kstTime = iso => { try { return new Date(iso).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); } catch { return iso; } };
const esc = s => (s??"").toString().replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

// ── 키 게이트 ──
function openGate(msg){ $("#gate").classList.add("on"); $("#err").textContent = msg||""; $("#keyin").focus(); }
function closeGate(){ $("#gate").classList.remove("on"); }
$("#keygo").onclick = () => { apiKey = $("#keyin").value.trim(); if(apiKey){ localStorage.setItem(KEY,apiKey); closeGate(); load(); } };
$("#keyin").addEventListener("keydown", e => { if(e.key==="Enter") $("#keygo").click(); });
$("#logout").onclick = () => { localStorage.removeItem(KEY); apiKey=""; openGate(); };
$("#refresh").onclick = () => load();

// ── 데이터 로드 ──
async function load(){
  if(!apiKey){ openGate(); return; }
  try {
    const r = await fetch("/api/dashboard/overview", { headers:{ "X-API-Key": apiKey } });
    if(r.status === 401){ openGate("API 키가 올바르지 않습니다."); return; }
    if(!r.ok){ throw new Error("HTTP "+r.status); }
    render(await r.json());
    $("#updated").textContent = "갱신 " + new Date().toLocaleTimeString("ko-KR");
  } catch(e){ $("#updated").textContent = "오류: " + e.message; }
}

function render(d){
  renderBadges(d.status);
  if(!d.persistence){
    for(const id of ["tiles","chart","news","ticks","orders","audits"])
      $("#"+id).innerHTML = '<div class="empty">DATABASE_URL 미설정 — 운영 데이터 없음</div>';
    $("#verdict").textContent = "";
    return;
  }
  renderEval(d.evaluation, d.paper);
  lastEquity = d.equity || [];
  drawChart(lastEquity);
  renderNews(d.news);
  renderTicks(d.ticks);
  renderOrders(d.orders);
  renderAudits(d.audits);
}

function renderBadges(s){
  const cb = s.circuit_breaker || {};
  const b = [];
  b.push(badge(s.mode==="LIVE"?"crit":"info", "모드", s.mode));
  b.push(badge(s.kill_switch?"crit":"good", "킬스위치", s.kill_switch?"ON — 차단":"해제"));
  b.push(badge(cb.tripped?"crit":"good", "서킷브레이커", cb.tripped?("발동 · "+(cb.reason||"")):"정상"));
  b.push(badge(s.market_open_now?"good":"mute", "장", s.market_open_now?"개장":"휴장/장외"));
  b.push(badge(s.persistence?"good":"warn", "DB", s.persistence?"연결":"없음"));
  b.push(badge(s.toss_connected?"good":"warn", "토스", s.toss_connected?"연결":"미설정"));
  $("#badges").innerHTML = b.join("");
}
const badge = (cls,k,v) => `<span class="badge"><span class="dot ${cls}"></span><b>${esc(k)}</b> ${esc(v)}</span>`;

function renderEval(ev, paper){
  if(!ev){ $("#tiles").innerHTML = '<div class="empty">평가 데이터 없음</div>'; $("#verdict").textContent=""; return; }
  const tiles = [];
  const cr = ev.cumulative_return;
  if(cr!=null) tiles.push(tile("누적수익", pct(cr), cr>=0?"up":"down"));
  if(ev.sharpe_annual!=null) tiles.push(tile("샤프(연)", ev.sharpe_annual.toFixed(2)));
  if(ev.mdd!=null) tiles.push(tile("MDD", pct(-Math.abs(ev.mdd)), "down"));
  if(ev.excess_return!=null) tiles.push(tile("벤치대비", pct(ev.excess_return), ev.excess_return>=0?"up":"down"));
  tiles.push(tile("완결거래", (paper?paper.trade_count:0)+"건"));
  tiles.push(tile("표본일수", (ev.n_days??0)+"일"));
  $("#tiles").innerHTML = tiles.join("");
  $("#verdict").innerHTML = "판정: <b>"+esc(ev.verdict||"—")+"</b>" +
    (paper? ` · 현금 ${won(paper.cash)} · 보유 ${paper.positions}종목 · 실현 ${won(paper.realized)}`:"");
}
const tile = (k,v,cls="") => `<div class="tile"><div class="k">${esc(k)}</div><div class="v ${cls}">${esc(v)}</div></div>`;

// ── 자산곡선 (인덱스 100 기준, 단일 축) ──
function drawChart(rows){
  const host = $("#chart");
  const eq = rows.filter(r => r.equity!=null);
  if(eq.length < 2){ host.innerHTML = '<div class="empty">자산곡선 데이터 부족 (2일 이상 필요)</div>'; return; }
  const cs = getComputedStyle(root);
  const S1 = cs.getPropertyValue("--s1").trim(), S2 = cs.getPropertyValue("--s2").trim();
  const base = Number(eq[0].equity);
  const bBaseRow = eq.find(r => r.benchmark!=null);
  const bBase = bBaseRow ? Number(bBaseRow.benchmark) : null;
  const port = eq.map(r => Number(r.equity)/base*100);
  const bench = eq.map(r => (r.benchmark!=null && bBase) ? Number(r.benchmark)/bBase*100 : null);
  const vals = port.concat(bench.filter(x=>x!=null));
  let lo = Math.min(...vals), hi = Math.max(...vals); if(lo===hi){lo-=1;hi+=1;}
  const pad = (hi-lo)*0.08; lo-=pad; hi+=pad;
  const W=680, H=240, mL=44, mR=12, mT=10, mB=22;
  const x = i => mL + (W-mL-mR) * (eq.length<2?0:i/(eq.length-1));
  const y = v => mT + (H-mT-mB) * (1 - (v-lo)/(hi-lo));
  const path = arr => arr.map((v,i)=> v==null?null:(`${x(i).toFixed(1)},${y(v).toFixed(1)}`))
    .filter(Boolean).map((p,i)=>(i===0?"M":"L")+p).join(" ");
  const gy = [lo, (lo+hi)/2, hi];
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="touch-action:none">`;
  for(const gv of gy){ svg += `<line class="grid-line" x1="${mL}" x2="${W-mR}" y1="${y(gv).toFixed(1)}" y2="${y(gv).toFixed(1)}"/>`;
    svg += `<text class="axis-txt" x="${mL-6}" y="${(y(gv)+3).toFixed(1)}" text-anchor="end">${gv.toFixed(0)}</text>`; }
  svg += `<line class="grid-line" x1="${mL}" x2="${mL}" y1="${mT}" y2="${H-mB}"/>`;
  svg += `<text class="axis-txt" x="${mL}" y="${H-6}">${esc(eq[0].date)}</text>`;
  svg += `<text class="axis-txt" x="${W-mR}" y="${H-6}" text-anchor="end">${esc(eq[eq.length-1].date)}</text>`;
  svg += `<path d="${path(bench)}" fill="none" stroke="${S2}" stroke-width="2" stroke-linejoin="round"/>`;
  svg += `<path d="${path(port)}" fill="none" stroke="${S1}" stroke-width="2" stroke-linejoin="round"/>`;
  svg += `<line id="cross" x1="0" x2="0" y1="${mT}" y2="${H-mB}" stroke="var(--axis)" stroke-width="1" style="display:none"/>`;
  svg += `<rect id="hit" x="${mL}" y="${mT}" width="${W-mL-mR}" height="${H-mT-mB}" fill="transparent"/>`;
  svg += `</svg>`;
  host.innerHTML = svg;
  // hover 크로스헤어 + 툴팁
  const el = host.querySelector("svg"), cross = host.querySelector("#cross"), tip = $("#tip");
  const move = ev => {
    const pt = el.getBoundingClientRect(); const sx = (ev.clientX-pt.left)/pt.width*W;
    let i = Math.round((sx-mL)/((W-mL-mR)/(eq.length-1))); i=Math.max(0,Math.min(eq.length-1,i));
    cross.setAttribute("x1",x(i)); cross.setAttribute("x2",x(i)); cross.style.display="block";
    tip.style.display="block"; tip.style.left=(ev.clientX+12)+"px"; tip.style.top=(ev.clientY+12)+"px";
    tip.innerHTML = `<b>${esc(eq[i].date)}</b><br>포트폴리오 ${port[i].toFixed(1)}`
      + (bench[i]!=null?`<br>벤치마크 ${bench[i].toFixed(1)}`:"");
  };
  el.addEventListener("pointermove", move);
  el.addEventListener("pointerleave", () => { cross.style.display="none"; tip.style.display="none"; });
}

function renderNews(n){
  if(!n || !n.total){ $("#news").innerHTML = '<div class="empty">수집된 뉴스 없음</div>'; return; }
  const t = n.by_mapping["naver_query+title_match"]||0, de = n.by_mapping["naver_query+desc_match"]||0;
  const tot = t+de || 1;
  let h = `<div style="font-size:22px;font-weight:650">${nf.format(n.total)}<span class="sub"> 건 · ${n.by_symbol.length}종목</span></div>`;
  h += `<div class="splitbar"><span style="width:${(t/tot*100).toFixed(1)}%;background:var(--s1)"></span>`
     + `<span style="width:2px;background:var(--surface)"></span>`
     + `<span style="flex:1;background:var(--muted)"></span></div>`;
  h += `<div class="split-legend"><span><i class="sq" style="background:var(--s1)"></i>제목 매핑 ${nf.format(t)} (정밀)</span>`
     + `<span><i class="sq" style="background:var(--muted)"></i>요약만 ${nf.format(de)} (광범위)</span></div>`;
  h += `<div class="sub" style="margin-top:10px">최근 헤드라인</div>`;
  h += n.recent.slice(0,5).map(r =>
    `<div style="margin-top:6px"><div class="headline">${esc(r.headline.slice(0,54))}</div>`
    + `<div class="sub">${esc(r.symbol)} · ${esc(r.press)} · ${kstTime(r.published_at)}</div></div>`).join("");
  $("#news").innerHTML = h;
}

function renderTicks(ts){
  if(!ts || !ts.length){ $("#ticks").innerHTML='<div class="empty">틱 없음 — 거래 잡 정지 중이거나 데이터 없음</div>'; return; }
  let h = `<table class="tbl"><thead><tr><th>시각</th><th>모드</th><th>유니버스</th><th>후보</th><th>레짐</th><th>비고</th></tr></thead><tbody>`;
  h += ts.map(t => `<tr><td>${kstTime(t.started_at)}</td><td>${esc(t.mode)}</td>`
    + `<td>${t.universe_count}</td><td>${t.candidates}</td>`
    + `<td>${esc((t.regime&&t.regime.level)||"—")}</td>`
    + `<td class="sub">${esc((t.circuit_breaker?"CB발동 ":"")+(t.note||""))||"—"}</td></tr>`).join("");
  $("#ticks").innerHTML = h + "</tbody></table>";
}

function renderOrders(os){
  if(!os || !os.length){ $("#orders").innerHTML='<div class="empty">주문 없음</div>'; return; }
  let h = `<table class="tbl"><thead><tr><th>시각</th><th>종목</th><th>구분</th><th>수량</th><th>상태</th></tr></thead><tbody>`;
  h += os.map(o => { const sc = o.side==="BUY"?"buy":"sell";
    return `<tr><td>${kstTime(o.created_at)}</td><td>${esc(o.symbol)}</td>`
    + `<td class="${sc}">${esc(o.side)}</td><td>${esc(o.quantity||"—")}</td>`
    + `<td><span class="pill">${esc(o.status)}</span>${o.reason?'<div class="sub">'+esc(o.reason)+'</div>':''}</td></tr>`; }).join("");
  $("#orders").innerHTML = h + "</tbody></table>";
}

function renderAudits(as){
  if(!as || !as.length){ $("#audits").innerHTML='<div class="empty">안전 이벤트 없음 (정상)</div>'; return; }
  let h = `<table class="tbl"><thead><tr><th>시각</th><th>주체</th><th>이벤트</th></tr></thead><tbody>`;
  h += as.map(a => `<tr><td>${kstTime(a.ts)}</td><td>${esc(a.actor)}</td>`
    + `<td>${esc(a.action)}<div class="sub">${esc(JSON.stringify(a.payload).slice(0,60))}</div></td></tr>`).join("");
  $("#audits").innerHTML = h + "</tbody></table>";
}

// ── 시작 + 자동 갱신 ──
if(!apiKey) openGate(); else load();
setInterval(() => { if(apiKey && !$("#gate").classList.contains("on")) load(); }, 15000);
</script>
</body>
</html>
